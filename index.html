<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Collection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Arial Rounded MT Bold", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fff8ef;
      overflow-x: hidden;
      color: #111;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 28px 34px 60px;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 999px;
      filter: blur(40px);
      opacity: 0.45;
      z-index: 0;
    }

    .blob-pink {
      width: 260px;
      height: 260px;
      background: #ff8cc8;
      top: -80px;
      left: -80px;
    }

    .blob-purple {
      width: 420px;
      height: 420px;
      background: #9b67ff;
      right: -140px;
      bottom: -120px;
    }

    .container {
      max-width: 1480px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .navbar {
      height: 104px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 216, 120, 0.55);
      border-radius: 32px;
      box-shadow: 0 18px 40px rgba(120, 73, 20, 0.12);
      backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff5fa8, #ffe04d, #42d6ff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      box-shadow: 0 8px 20px rgba(255, 95, 168, 0.25);
    }

    .brand-title {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ff58a8, #b466ff, #36d6e7);
      -webkit-background-clip: text;
      color: transparent;
      white-space: nowrap;
    }

    .nav-left,
    .nav-menu,
    .nav-actions {
      display: flex;
      align-items: center;
    }

    .nav-left {
      gap: 44px;
    }

    .nav-menu {
      gap: 18px;
      list-style: none;
      font-size: 18px;
      font-weight: 800;
    }

    .nav-menu a {
      text-decoration: none;
      color: #111;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 22px;
      border-radius: 22px;
      transition: 0.25s;
    }

    .nav-menu a:hover,
    .nav-menu .active {
      background: #ffe354;
      box-shadow: 0 8px 18px rgba(255, 203, 48, 0.32);
    }

    .nav-actions {
      gap: 18px;
    }

    .search-btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 1px solid #e5ded1;
      background: #fff;
      font-size: 24px;
      cursor: pointer;
      transition: 0.25s;
    }

    .login-btn {
      border: none;
      cursor: pointer;
      padding: 17px 30px;
      border-radius: 999px;
      background: linear-gradient(90deg, #8f69ff, #a065f7);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(132, 90, 255, 0.28);
      transition: 0.25s;
    }

    .search-btn:hover,
    .login-btn:hover {
      transform: scale(1.05);
    }

    .hero-wrap {
      margin-top: 28px;
      padding: 10px;
      border-radius: 36px;
      background: linear-gradient(90deg, #d6a8ff, #ffc4e7, #caa5ff);
      box-shadow: 0 20px 45px rgba(146, 88, 255, 0.22);
    }

    .hero {
      display: grid;
      grid-template-columns: 295px repeat(4, 1fr);
      gap: 12px;
      background: #fff9d9;
      border-radius: 30px;
      padding: 12px;
    }

    .hero-card {
      position: relative;
      min-height: 300px;
      border-radius: 28px;
      overflow: hidden;
    }

    .hero-intro {
      background: linear-gradient(135deg, #fff16a, #ffd83d);
      padding: 38px 34px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-intro h2 {
      font-size: 32px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .hero-intro p {
      font-size: 18px;
      color: #4a3c13;
      margin-bottom: 28px;
      font-weight: 700;
    }

    .hero-intro button {
      width: fit-content;
      border: none;
      border-radius: 999px;
      padding: 15px 30px;
      background: linear-gradient(90deg, #ff5fa8, #ff4f9a);
      color: white;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 79, 154, 0.28);
    }

    .decor-star {
      position: absolute;
      right: 24px;
      top: 28px;
      font-size: 44px;
      color: #22bff0;
    }

    .decor-wave {
      position: absolute;
      right: 24px;
      bottom: 24px;
      font-size: 52px;
      color: #30c7a7;
      transform: rotate(-18deg);
      opacity: 0.8;
    }

    .poster img,
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: 0.5s;
    }

    .poster {
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent 55%);
    }

    .poster h3 {
      position: absolute;
      left: 22px;
      bottom: 22px;
      z-index: 2;
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.1;
      text-shadow: 0 4px 14px rgba(0,0,0,0.5);
    }

    .poster:hover img,
    .gallery-item:hover img {
      transform: scale(1.1);
    }

    .content-grid {
      margin-top: 36px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .section-card {
      border-radius: 32px;
      padding: 26px 22px 24px;
      box-shadow: 0 12px 28px rgba(90, 49, 13, 0.08);
    }

    .pink-card {
      background: #fff0f7;
      border: 1px solid #ffb6d7;
    }

    .yellow-card {
      background: #fffbee;
      border: 1px solid #f2d35a;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 30px;
      font-weight: 900;
    }

    .section-subtitle {
      margin-left: 20px;
      font-size: 15px;
      color: #777;
      font-weight: 700;
    }

    .more-btn {
      border: none;
      border-radius: 999px;
      padding: 13px 26px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .more-pink {
      background: #ffc1dc;
      color: #a92666;
    }

    .more-yellow {
      background: #ffe35a;
      color: #705800;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .gallery-item {
      height: 285px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
      background: #eee;
    }

    .gallery-item:hover {
      transform: translateY(-8px);
    }

    .corner-dots {
      position: absolute;
      left: 45px;
      bottom: 60px;
      display: grid;
      grid-template-columns: repeat(4, 5px);
      gap: 14px;
    }

    .corner-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #111;
    }

    @media (max-width: 1180px) {
      .navbar {
        height: auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        padding: 24px;
      }

      .nav-left {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .nav-menu {
        flex-wrap: wrap;
      }

      .hero {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-intro {
        grid-column: span 2;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 18px 14px 40px;
      }

      .brand-title {
        font-size: 26px;
      }

      .nav-menu {
        font-size: 15px;
        gap: 8px;
      }

      .nav-menu a {
        padding: 10px 14px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .hero-intro {
        grid-column: auto;
      }

      .hero-card {
        min-height: 360px;
      }

      .content-grid {
        margin-top: 24px;
      }

      .section-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }

      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      .gallery-item {
        height: 230px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="blob blob-pink"></div>
    <div class="blob blob-purple"></div>

    <div class="container">
      <nav class="navbar">
        <div class="nav-left">
          <div class="brand">
            <div class="brand-icon">✿</div>
            <div class="brand-title">My Collection</div>
          </div>

          <ul class="nav-menu">
            <li><a class="active" href="#">🏠 首页</a></li>
            <li><a href="#">图片</a></li>
            <li><a href="#">电视剧</a></li>
            <li><a href="#">电影</a></li>
            <li><a href="#">音乐</a></li>
            <li><a href="#">书籍</a></li>
            <li><a href="#">关于我</a></li>
          </ul>
        </div>

        <div class="nav-actions">
          <button class="search-btn">⌕</button>
          <button class="login-btn">☺ 登录 / 注册</button>
        </div>
      </nav>

      <section class="hero-wrap">
        <div class="hero">
          <div class="hero-card hero-intro">
            <span class="decor-star">✸</span>
            <h2>热门电视剧</h2>
            <p>精彩剧情不容错过 ✨</p>
            <button>去看看 →</button>
            <span class="decor-wave">〰</span>
          </div>

          <article class="hero-card poster">
            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop" alt="Breaking Bad" />
            <h3>Breaking<br>Bad</h3>
          </article>

          <article class="hero-card poster">
            <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1200&auto=format&fit=crop" alt="Stranger Things" />
            <h3>Stranger<br>Things</h3>
          </article>

          <article class="hero-card poster">
            <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=1200&auto=format&fit=crop" alt="The Last Of Us" />
            <h3>The Last<br>Of Us</h3>
          </article>

          <article class="hero-card poster">
            <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=1200&auto=format&fit=crop" alt="Friends" />
            <h3>Friends</h3>
          </article>
        </div>
      </section>

      <section class="content-grid">
        <div class="section-card pink-card">
          <div class="section-head">
            <div>
              <div class="section-title">⭐ 推荐图片 <span class="section-subtitle">每日精选，灵感无限</span></div>
            </div>
            <button class="more-btn more-pink">更多 →</button>
          </div>

          <div class="gallery">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=900&auto=format&fit=crop" alt="推荐图片" /></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?q=80&w=900&auto=format&fit=crop" alt="推荐图片" /></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=900&auto=format&fit=crop" alt="推荐图片" /></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=900&auto=format&fit=crop" alt="推荐图片" /></div>
          </div>
        </div>

        <div class="section-card yellow-card">
          <div class="section-head">
            <div>
              <div class="section-title">👍 推荐图片 <span class="section-subtitle">发现有趣的视觉瞬间</span></div>
            </div>
            <button class="more-btn more-yellow">更多 →</button>
          </div>

          <div class="gallery">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=900&auto=format&fit=crop" alt="推荐图片" /></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=900&auto=format&fit=crop" alt="推荐图片" /></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=900&auto=format&fit=crop" alt="推荐图片" /></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=900&auto=format&fit=crop" alt="推荐图片" /></div>
          </div>
        </div>
      </section>
    </div>

    <div class="corner-dots">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </main>
</body>
</html>
